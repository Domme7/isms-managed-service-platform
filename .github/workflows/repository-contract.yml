name: Repository Contract

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate handoff package
        run: python scripts/validate_handoff.py
      - name: Repository unit tests
        run: python -m unittest discover -s tests/repository -p "test_*.py"
