# Optionaler lokaler PostgreSQL-Server für @isms/db (ADR-0002).
# NICHT erforderlich für Bau/Tests (die laufen gegen PGlite, in-memory, ohne Docker).
# Werte kommen aus .env (siehe .env.example) — es sind ausschließlich Platzhalter, keine Secrets.
services:
  postgres:
    image: postgres:16-alpine
    container_name: isms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - isms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  isms_pgdata:
